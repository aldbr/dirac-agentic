name: submit_job_with_sandbox
skill: submit-job
description: Submit a job with input and output sandboxes.
user_input: "Submit run.sh with input data.root, retrieve output.root"
expected_goal: "Submit a job with input/output sandboxes successfully"

expected_tool_calls:
  - name: submit_job
    args:
      executable: "run.sh"
      job_name: "Sandbox Job"
      input_sandbox:
        - "run.sh"
        - "data.root"
      output_sandbox:
        - "output.root"

mock_responses:
  submit_job:
    return_value:
      job_ids:
        - 42002
