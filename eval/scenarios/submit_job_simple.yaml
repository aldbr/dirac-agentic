name: submit_job_simple
skill: submit-job
description: Submit a simple echo hello-world job.
user_input: "Submit a hello world echo job"
expected_goal: "Submit an echo hello-world job successfully"

expected_tool_calls:
  - name: submit_job
    args:
      executable: "/bin/echo"
      job_name: "Hello World"
      arguments: "hello world"

mock_responses:
  submit_job:
    return_value:
      job_ids:
        - 42001
